name: greenleaf

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-greenleaf}
      POSTGRES_PASSWORD: ${DB_PASS:-greenleaf_secret}
      POSTGRES_DB: ${DB_NAME:-greenleaf_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-greenleaf} -d ${DB_NAME:-greenleaf_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-greenleaf}
      DB_PASS: ${DB_PASS:-greenleaf_secret}
      DB_NAME: ${DB_NAME:-greenleaf_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-change-me-to-a-random-32-char-key}
      API_PORT: 3001
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-change-me}
      AUTH_LOGIN_THROTTLE_LIMIT: ${AUTH_LOGIN_THROTTLE_LIMIT:-1000}
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://api:3001
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api

  # Playwright E2E runner. Not part of the default `up` lifecycle; invoked
  # explicitly by run_tests.sh via `docker compose run --rm e2e`.
  e2e:
    profiles: ['e2e']
    build:
      context: .
      dockerfile: e2e.Dockerfile
    environment:
      # Tests point at localhost so Chromium treats the origin as secure
      # (needed for service workers). socat inside the e2e container
      # forwards 127.0.0.1:3000→web:3000 and 127.0.0.1:3001→api:3001.
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:3001
      E2E_ADMIN_USER: ${E2E_ADMIN_USER:-demo_admin}
      E2E_ADMIN_PASS: ${E2E_ADMIN_PASS:-Demo1234!}
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

volumes:
  pgdata:
